# Provera na svakom push/PR na main. Zeleni X = CI prošao (lakše debug od „Deployments“ u sidebaru).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Prava Postgres instanca — `next build` generiše sitemap (Prisma) i mora moći da se poveže.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        # 5432 na runneru ponekad je zauzet (lokalni servisi) → beli pad konekcije / migrate
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5433/ci?schema=public&connect_timeout=60
      NEXTAUTH_SECRET: ci-placeholder-secret-at-least-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PRIVATE_BUILD_WORKER_COUNT: '1'
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production, critical)
        run: npm audit --omit=dev --audit-level=critical

      - name: Prisma (šema + klijent)
        run: npx prisma validate && npx prisma generate

      - name: Prisma migrate (prazna CI baza)
        run: npx prisma migrate deploy

      - name: ESLint
        run: npm run lint

      # Uhvati greške kompajliranja pre Netlify.
      - name: Next.js build
        run: npm run build:next

      # Ako Tailwind/CSS ne generiše chunkove, produkcija može izgledati kao „goli“ HTML.
      - name: Provera da postoji bar jedan CSS iz builda
        run: |
          test -d .next/static/css || { echo "::error::Nema direktorijuma .next/static/css"; exit 1; }
          css_count=$(find .next/static/css -type f -name '*.css' 2>/dev/null | wc -l)
          if [ "$css_count" -lt 1 ]; then echo "::error::Nema .css fajlova u .next/static/css"; exit 1; fi
          echo "OK: $css_count CSS fajlova"
