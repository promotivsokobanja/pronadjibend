# Provera na svakom push/PR na main. Zeleni X = CI prošao (lakše debug od „Deployments“ u sidebaru).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    # Isti tip varijabli kao na buildu — postinstall (prisma generate) i next build ne pucaju na P1012 / NextAuth.
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-placeholder-secret-at-least-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PRIVATE_BUILD_WORKER_COUNT: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production, critical)
        run: npm audit --omit=dev --audit-level=critical

      - name: Prisma (šema + klijent)
        run: npx prisma validate && npx prisma generate

      - name: ESLint
        run: npm run lint

      # Uhvati greške kompajliranja pre Netlify (CI ne radi migrate kao Netlify build).
      - name: Next.js build
        run: npm run build:next
