# Automatska provera na svakom pushu i pull requestu (pre Netlify deploya).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Dummy URL — validate/generate ne otvaraju konekciju; bez ovoga P1012 ako nema DATABASE_URL u repo secrets
      - name: Prisma (šema i klijent)
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
        run: npx prisma validate && npx prisma generate

      - name: ESLint
        run: npm run lint
