# Produkcija je na Netlifyju (ne Vercel). Status deploya gledaj u Netlify → Deploys.
# Ako GitHub prikazuje lažne crvene „Deployments“: repo → Settings → GitHub Apps — isključi stari Vercel;
# About → Website: https://pronadjibend.rs
#
# Set secrets in Netlify UI: Site configuration → Environment variables
# Required for build: DATABASE_URL (Neon Postgres). Also add NEXTAUTH_URL, NEXTAUTH_SECRET for auth.
# Opciono: ALLOWED_AUTH_ORIGINS=https://pronadjibend.rs,https://www.pronadjibend.rs
#
# Email obaveštenja bendu o novom upitu (runtime, ne build):
#   SMTP_HOST, SMTP_PORT (587), SMTP_USER, SMTP_PASS, SMTP_SECURE (true samo za 465)
#   SMTP_FROM ili BOOKING_EMAIL_FROM npr. "Pronađi Bend <office@pronadjibend.rs>"
# Bend prima mejl na User.email naloga vezanog za bend; Reply-To = email klijenta iz forme.
#
# Automatski deploy: Netlify → Site configuration → Build & deploy → Continuous deployment
# → poveži GitHub repo (promotivsokobanja/pronadjibend), production branch = main.
# Svaki git push na main pokreće build (migrate + next build) i objavu.

[build]
  # prisma generate je već u npm run build; db push sinhronizuje šemu direktno
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Bez ovoga, ako je u Netlify UI NODE_ENV=production, npm preskače devDependencies —
  # nema `prisma` CLI → postinstall (`prisma generate`) i build padaju na „Install dependencies”.
  NPM_CONFIG_PRODUCTION = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
